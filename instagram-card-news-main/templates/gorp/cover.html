<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gorp Cover</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1350px; overflow: hidden; position: relative;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1f2937;
    }
    .bg {
      position: absolute; inset: 0;
      background: url('{{image_url}}') center / cover no-repeat, linear-gradient(135deg,#334155,#0f172a);
    }
    .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.28) 45%, rgba(0,0,0,0.75) 100%);
    }
    .content {
      position: absolute; left: 64px; right: 64px; bottom: 92px; color: #fff;
    }
    .label {
      display: inline-block; margin-bottom: 18px; padding: 8px 14px; border-radius: 999px;
      background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.35);
      font-size: 20px; font-weight: 700; letter-spacing: 0.02em;
    }
    .headline {
      font-size: 88px; line-height: 1.04; letter-spacing: -0.035em; font-weight: 900;
      text-shadow: 0 4px 18px rgba(0,0,0,0.55); word-break: keep-all;
    }
    .subtext {
      margin-top: 18px; font-size: 44px; font-weight: 600; line-height: 1.28;
      color: rgba(255,255,255,0.92);
    }
    .meta {
      margin-top: 34px; display: flex; justify-content: space-between; color: rgba(255,255,255,0.8);
      font-size: 24px; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="label">{{headline_label}}</div>
    <h1 class="headline">{{headline}}</h1>
    <p class="subtext">{{subtext}}</p>
    <div class="meta">
      <span>@{{account_name}}</span>
      <span>{{slide_number}} / {{total_slides}}</span>
    </div>
  </div>
</body>
</html>
