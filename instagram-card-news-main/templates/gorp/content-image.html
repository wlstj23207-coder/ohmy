<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Gorp Image</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;overflow:hidden;position:relative;font-family:'Pretendard',sans-serif;background:#111827}
.bg{position:absolute;inset:0;background:url('{{image_url}}') center/cover no-repeat,linear-gradient(145deg,#1f2937,#0f172a)}
.ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.18) 0%,rgba(0,0,0,.44) 48%,rgba(0,0,0,.84) 100%)}
.wrap{position:absolute;inset:0;padding:76px 64px 86px;color:#fff;display:flex;flex-direction:column}
.headline{font-size:76px;font-weight:900;line-height:1.08;letter-spacing:-.04em;text-shadow:0 4px 14px rgba(0,0,0,.55)}
.body{margin-top:auto;font-size:39px;line-height:1.38;font-weight:600;color:rgba(255,255,255,.96)}
.meta{margin-top:22px;display:flex;justify-content:space-between;font-size:22px;color:rgba(255,255,255,.78);font-weight:600}
</style></head>
<body><div class="bg"></div><div class="ov"></div><div class="wrap">
<h1 class="headline">{{headline}}</h1>
<p class="body">{{body}}</p>
<div class="meta"><span>@{{account_name}}</span><span>{{slide_number}} / {{total_slides}}</span></div>
</div></body></html>
