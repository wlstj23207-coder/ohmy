<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Gorp Badge</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;overflow:hidden;position:relative;font-family:'Pretendard',sans-serif;background:#111827}
.bg{position:absolute;inset:0;background:url('{{image_url}}') center/cover no-repeat,linear-gradient(145deg,#1f2937,#0f172a)}
.ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.2) 0%,rgba(0,0,0,.5) 38%,rgba(0,0,0,.85) 100%)}
.wrap{position:absolute;inset:0;padding:72px 64px 84px;color:#fff;display:flex;flex-direction:column}
.badge{display:inline-flex;padding:10px 18px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.35);font-size:24px;font-weight:800;margin-bottom:20px}
.headline{font-size:72px;font-weight:900;line-height:1.08;letter-spacing:-.04em;text-shadow:0 4px 14px rgba(0,0,0,.5)}
.body{margin-top:auto;font-size:40px;line-height:1.38;font-weight:600;color:rgba(255,255,255,.94)}
.meta{margin-top:24px;display:flex;justify-content:space-between;font-size:22px;color:rgba(255,255,255,.78);font-weight:600}
</style></head>
<body><div class="bg"></div><div class="ov"></div><div class="wrap">
<div class="badge">{{badge_text}}</div>
<h1 class="headline">{{headline}}</h1>
<p class="body">{{body}}</p>
<div class="meta"><span>@{{account_name}}</span><span>{{slide_number}} / {{total_slides}}</span></div>
</div></body></html>
