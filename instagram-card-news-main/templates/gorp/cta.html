<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Gorp CTA</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;overflow:hidden;position:relative;font-family:'Pretendard',sans-serif;background:#0f172a}
.bg{position:absolute;inset:0;background:url('{{image_url}}') center/cover no-repeat,linear-gradient(145deg,#1f2937,#0f172a)}
.ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.24) 0%,rgba(0,0,0,.58) 44%,rgba(0,0,0,.88) 100%)}
.wrap{position:absolute;inset:0;padding:72px 64px 88px;color:#fff;display:flex;flex-direction:column;justify-content:flex-end}
.headline{font-size:72px;font-weight:900;line-height:1.08;letter-spacing:-.04em;text-shadow:0 4px 14px rgba(0,0,0,.56)}
.btn{margin-top:24px;display:inline-block;padding:18px 28px;border-radius:14px;background:#fff;color:#0f172a;font-size:36px;font-weight:900;letter-spacing:-.02em}
.tags{margin-top:24px;display:flex;gap:10px;flex-wrap:wrap}
.tag{padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);font-size:22px;font-weight:700}
.meta{margin-top:26px;display:flex;justify-content:space-between;font-size:22px;color:rgba(255,255,255,.78);font-weight:600}
</style></head>
<body><div class="bg"></div><div class="ov"></div><div class="wrap">
<h1 class="headline">{{headline}}</h1>
<div class="btn">{{cta_text}}</div>
<div class="tags"><span class="tag">{{tag1}}</span><span class="tag">{{tag2}}</span><span class="tag">{{tag3}}</span></div>
<div class="meta"><span>@{{account_name}}</span><span>{{slide_number}} / {{total_slides}}</span></div>
</div></body></html>
